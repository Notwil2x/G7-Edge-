version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: g7_edge_db
    environment:
      POSTGRES_USER: g7user
      POSTGRES_PASSWORD: g7password
      POSTGRES_DB: g7_edge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U g7user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
